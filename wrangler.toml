name = "twictbots"
main = "cloudflare/worker.mjs"
compatibility_date = "2026-03-15"

[triggers]
crons = ["* * * * *"]

[vars]
APP_NAME = "StreamTwitch"
LOG_LEVEL = "info"
REQUEST_TIMEOUT_MS = "10000"
MAX_RETRIES = "2"
TIME_ZONE = "Europe/Kiev"
ENABLE_TELEGRAM = "true"
ENABLE_DISCORD = "true"
DISCORD_MENTION_EVERYONE = "true"
DISCORD_USERNAME = "StreamTwitch"
DISCORD_AVATAR_URL = "https://static.twitchcdn.net/assets/favicon-32-e29e246c157142c94346.png"
# For bot-mode, store DISCORD_BOT_TOKEN as a secret and set the channel IDs below.
# DISCORD_CHANNEL_ID = "your_main_channel_id"
ENABLE_DISCORD_BOT_TEST_MODE = "true"
DISCORD_APPLICATION_ID = "1366694395168034888"
DISCORD_PUBLIC_KEY = "0e6f9517a6172c559ce3636d6b6e37e5575e75fe2bae1c9b6cc9ab64debd14ac"
DISCORD_TEST_GUILD_ID = "1487715231672045720"
DISCORD_TEST_MENTION_EVERYONE = "true"
DISCORD_TEST_USERNAME = "StreamTwitch"
DISCORD_TEST_GIF_URL = "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExcjRlYWN6aXZsYnZycTdnN2M4bGI3OXd2c2NkNmltNmpvc2F2Y3F4NyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/HSyR7A954pdC4w6PHa/giphy.gif"
DISCORD_TEST_FOOTER_LABEL = "уведомление о стриме"
DISCORD_TEST_CHANNEL_ID = "1490423155024597143"
DISCORD_FEEDBACK_GUILD_ID = "1487715231672045720"
DISCORD_FEEDBACK_CHANNEL_ID = "1491176670948757674"
DISCORD_SMS_AUTO_REACTIONS = "✅,💬,📌"
DISCORD_OWNER_USER_IDS = "838188176878075925"
STREAMERS_JSON = """{"streamers":[{"url":"https://www.twitch.tv/Wooflyaa","label":"Wooflyaa","accentColor":"#E11D48"}]}"""

# Cloudflare can now auto-provision KV bindings during deploys from Wrangler
# and from dashboard/Git builds when the resource ID is omitted.
[[kv_namespaces]]
binding = "STATE_KV"
